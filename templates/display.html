{% extends "base.html" %}
{% block title %}Match Display{% endblock %}
{% block bodyclass %}display{% endblock %}
{% block content %}
  <header class="disp-top">
    <div class="match-label" id="match-label">&ndash;</div>
    <div id="timer" class="timer">--:--</div>
    <div id="phase" class="phase"></div>
    <div id="total-time" class="total-time"></div>
  </header>
  <main class="alliances">
    <section class="alliance yellow" id="yellow-side">
      <div class="alliance-name">YELLOW</div>
      <div class="team-name" id="yellow-team">---</div>
      <div class="score" id="yellow-score">0</div>
      <div class="penalties">FOULS <span id="yellow-fouls">0</span> &middot; MAJOR <span id="yellow-majors">0</span></div>
    </section>
    <div class="vs">VS</div>
    <section class="alliance green" id="green-side">
      <div class="alliance-name">GREEN</div>
      <div class="team-name" id="green-team">---</div>
      <div class="score" id="green-score">0</div>
      <div class="penalties">FOULS <span id="green-fouls">0</span> &middot; MAJOR <span id="green-majors">0</span></div>
    </section>
  </main>
{% endblock %}
{% block script %}
<script>
const last = { yellow: null, green: null };

function setScore(team, val) {
  const el = document.getElementById(team + '-score');
  if (last[team] !== null && val !== last[team]) {
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  }
  last[team] = val;
  el.textContent = val;
}

function setClock(s) {
  const p = phaseInfo(s);

  const phaseEl = document.getElementById('phase');
  phaseEl.textContent = p.label;
  phaseEl.className = 'phase ' + p.cls;

  // Big clock counts down the CURRENT phase; flash red when it's almost up
  // and through all of endgame.
  const timer = document.getElementById('timer');
  timer.textContent = fmtTime(p.phaseRem);
  timer.className = 'timer';
  if (p.cls === 'done') {
    timer.classList.add('done');
  } else if (s.timer_running && (p.cls === 'endgame' || p.phaseRem <= 10)) {
    timer.classList.add('low', 'pulse');
  } else if (s.timer_running && p.phaseRem <= 15) {
    timer.classList.add('warn');
  }

  const total = document.getElementById('total-time');
  total.textContent =
    (s.timer_remaining > 0 && s.timer_remaining < s.timer_duration)
      ? 'FULL MATCH ' + fmtTime(s.timer_remaining)
      : '';
}

async function refresh() {
  try {
    const s = await fetchState();
    document.getElementById('match-label').textContent = s.match_label || ('MATCH ' + s.match_number);
    document.getElementById('yellow-team').textContent = s.yellow_team;
    document.getElementById('green-team').textContent = s.green_team;
    setScore('yellow', s.yellow_score);
    setScore('green', s.green_score);
    document.getElementById('yellow-fouls').textContent = s.yellow_fouls;
    document.getElementById('yellow-majors').textContent = s.yellow_majors;
    document.getElementById('green-fouls').textContent = s.green_fouls;
    document.getElementById('green-majors').textContent = s.green_majors;
    setClock(s);

    document.getElementById('yellow-side').classList.toggle('leading', s.yellow_score > s.green_score);
    document.getElementById('green-side').classList.toggle('leading', s.green_score > s.yellow_score);
  } catch (e) { /* keep last known values if the network hiccups */ }
}
refresh();
setInterval(refresh, 1000);
</script>
{% endblock %}
