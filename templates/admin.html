{% extends "base.html" %}
{% block title %}Match Admin{% endblock %}
{% block bodyclass %}admin{% endblock %}
{% block content %}
  <h1>MATCH ADMIN</h1>

  <section class="card">
    <h2>Timer <span id="timer-mini" class="mini">--:--</span></h2>
    <div class="btn-row">
      <button class="ctl start" data-action="start">Start</button>
      <button class="ctl pause" data-action="pause">Pause</button>
      <button class="ctl reset" data-action="reset">Reset</button>
    </div>
  </section>

  <section class="card">
    <h2>Schedule <span id="sched-mini" class="mini"></span></h2>
    <div class="btn-row">
      <button id="prev-match" class="ctl">&#9664; Prev</button>
      <button id="next-match" class="ctl save">Next Match &#9654;</button>
    </div>
    <div id="sched-msg" class="msg"></div>
    <button id="reset-schedule" class="ctl danger">Restart schedule (clear all results)</button>
  </section>

  <section class="card">
    <h2>Match Setup</h2>
    <label>Match number
      <input id="match-number" type="number" min="1" max="9999" inputmode="numeric">
    </label>
    <label>Yellow team name
      <input id="yellow-team" maxlength="20" autocomplete="off">
    </label>
    <label>Green team name
      <input id="green-team" maxlength="20" autocomplete="off">
    </label>
    <label>Auto time (seconds)
      <input id="auto-duration" type="number" min="0" max="600" inputmode="numeric">
    </label>
    <label>Teleop time (seconds)
      <input id="driver-duration" type="number" min="5" max="3600" inputmode="numeric">
    </label>
    <label>Endgame time (seconds)
      <input id="endgame-duration" type="number" min="0" max="600" inputmode="numeric">
      <span class="hint">Official GEM QUEST: 20 auto &middot; 100 teleop &middot; 30 endgame (2:30 total)</span>
    </label>
    <button id="save" class="ctl save">Save</button>
    <div id="save-msg" class="msg"></div>
  </section>

  <section class="card">
    <h2>Scores <span id="score-mini" class="mini"></span></h2>
    <button id="reset-scores" class="ctl danger">Reset scores &amp; fouls to 0</button>
  </section>

  <div class="foot-links">
    <a href="/">Referee</a> &middot; <a href="/display">Display</a> &middot; <a href="/schedule">Schedule</a>
  </div>
{% endblock %}
{% block script %}
<script>
let formLoaded = false;

function fillForm(s) {
  document.getElementById('match-number').value = s.match_number;
  document.getElementById('yellow-team').value = s.yellow_team;
  document.getElementById('green-team').value = s.green_team;
  document.getElementById('auto-duration').value = s.auto_duration;
  document.getElementById('driver-duration').value = s.driver_duration;
  document.getElementById('endgame-duration').value = s.endgame_duration;
  formLoaded = true;
}

function showStatus(s) {
  const t = document.getElementById('timer-mini');
  t.textContent = fmtTime(s.timer_remaining) + (s.timer_running ? ' (running)' : '');
  document.getElementById('score-mini').textContent =
    'Yellow ' + s.yellow_score + ' – Green ' + s.green_score;
  if (!formLoaded) fillForm(s);
}

async function post(url, body) {
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const s = await r.json();
  if (!r.ok) throw new Error(s.error || 'request failed');
  showStatus(s);
  return s;
}

document.querySelectorAll('[data-action]').forEach(btn =>
  btn.addEventListener('click', () => post('/api/timer', { action: btn.dataset.action }).catch(() => {}))
);

document.getElementById('save').addEventListener('click', async () => {
  const msg = document.getElementById('save-msg');
  try {
    const s = await post('/api/setup', {
      match_number: document.getElementById('match-number').value,
      yellow_team: document.getElementById('yellow-team').value,
      green_team: document.getElementById('green-team').value,
      auto_duration: document.getElementById('auto-duration').value,
      driver_duration: document.getElementById('driver-duration').value,
      endgame_duration: document.getElementById('endgame-duration').value
    });
    fillForm(s);
    msg.textContent = 'Saved.';
  } catch (e) {
    msg.textContent = e.message;
  }
  setTimeout(() => { msg.textContent = ''; }, 3000);
});

let schedCache = null;

async function refreshSchedule() {
  try {
    const r = await fetch('/api/schedule', { cache: 'no-store' });
    if (!r.ok) return;
    schedCache = await r.json();
    const cur = schedCache.matches[schedCache.current];
    document.getElementById('sched-mini').textContent =
      'Match ' + cur.n + '/' + schedCache.matches.length + ' · ' + cur.yellow + ' vs ' + cur.green;
  } catch (e) {}
}

async function stepMatch(dir) {
  const msg = document.getElementById('sched-msg');
  if (schedCache) {
    const cur = schedCache.matches[schedCache.current];
    const state = await fetchState().catch(() => null);
    if (dir === 1 && state) {
      const next = schedCache.matches[schedCache.current + 1];
      const q = 'Save Yellow ' + state.yellow_score + ' – Green ' + state.green_score +
        ' as the final for Match ' + cur.n + ' (' + cur.yellow + ' vs ' + cur.green + ')' +
        (next ? ' and load Match ' + next.n + ' (' + next.yellow + ' vs ' + next.green + ')?'
              : '? (This is the last match.)');
      if (!confirm(q)) return;
    }
    if (dir === -1 && !confirm('Go BACK to the previous match? Its saved score will be reloaded.')) return;
  }
  try {
    const s = await post('/api/next_match', { dir: dir });
    fillForm(s);
    await refreshSchedule();
    msg.textContent = 'Now on match ' + s.match_number + ': ' + s.yellow_team + ' vs ' + s.green_team;
  } catch (e) {
    msg.textContent = e.message;
  }
  setTimeout(() => { msg.textContent = ''; }, 4000);
}

document.getElementById('next-match').addEventListener('click', () => stepMatch(1));
document.getElementById('prev-match').addEventListener('click', () => stepMatch(-1));
document.getElementById('reset-schedule').addEventListener('click', async () => {
  if (!confirm('Restart the whole schedule? ALL saved match results will be erased.')) return;
  const s = await post('/api/setup', { reset_schedule: true }).catch(() => null);
  if (s) { fillForm(s); refreshSchedule(); }
});
refreshSchedule();

document.getElementById('reset-scores').addEventListener('click', () => {
  if (confirm('Reset both scores and fouls to 0?')) {
    post('/api/setup', { reset_scores: true }).catch(() => {});
  }
});

async function refresh() {
  try { showStatus(await fetchState()); } catch (e) {}
}
refresh();
setInterval(refresh, 1000);
</script>
{% endblock %}
